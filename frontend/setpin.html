<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Festac — Set PIN</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#c9a84c">
  <link rel="stylesheet" href="css/style.css">

  <style>
    body {
      background:#0a0a0a;
      color:#fff;
      font-family:'Syne',sans-serif;
      margin:0;
    }

    /* Header (same as dashboard) */
    .top-header {
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:16px 20px;
      background:#121212;
      border-bottom:1px solid #222;
    }

    .back-btn {
      color:#c9a84c;
      font-size:18px;
      cursor:pointer;
    }

    .title {
      font-size:16px;
      font-weight:700;
    }

    /* PIN UI */
    .pin-container {
      padding:20px;
      text-align:center;
    }

    .pin-title {
      font-size:20px;
      font-weight:700;
      margin-bottom:6px;
    }

    .pin-subtitle {
      font-size:13px;
      color:#aaa;
      margin-bottom:24px;
    }

    .pin-dots {
      display:flex;
      justify-content:center;
      gap:14px;
      margin-bottom:24px;
    }

    .pin-dot {
      width:14px;
      height:14px;
      border-radius:50%;
      border:2px solid #444;
    }

    .pin-dot.filled {
      background:#c9a84c;
      border-color:#c9a84c;
    }

    /* Keypad */
    .pin-pad {
      display:grid;
      grid-template-columns:repeat(3,1fr);
      gap:12px;
    }

    .pin-key {
      aspect-ratio:1;
      border-radius:14px;
      background:#1a1a1a;
      border:1px solid #222;
      color:#fff;
      font-size:20px;
      font-weight:700;
    }

    .pin-key:active {
      background:#c9a84c;
      color:#000;
    }

    .pin-key.delete {
      background:#121212;
    }

    /* Bottom nav (same as dashboard) */
    .bottom-nav {
      position:fixed;
      bottom:0;
      width:100%;
      display:flex;
      justify-content:space-around;
      background:#121212;
      padding:8px 0;
      border-top:1px solid #222;
    }

    .nav-item {
      font-size:12px;
      color:#888;
      text-align:center;
    }

    .nav-item.active {
      color:#c9a84c;
    }
  </style>
</head>

<body>

<!-- Header -->
<div class="top-header">
  <div class="back-btn" onclick="window.location='dashboard.html'">←</div>
  <div class="title" id="pageTitle">Set PIN</div>
  <div></div>
</div>

<div class="pin-container">

  <div class="pin-title" id="pinTitle">Create your PIN</div>
  <div class="pin-subtitle" id="pinSubtitle">
    Choose a 4-digit PIN to secure your transactions
  </div>

  <!-- Dots -->
  <div class="pin-dots">
    <div class="pin-dot" id="dot0"></div>
    <div class="pin-dot" id="dot1"></div>
    <div class="pin-dot" id="dot2"></div>
    <div class="pin-dot" id="dot3"></div>
  </div>

  <!-- Keypad -->
  <div class="pin-pad">
    <button class="pin-key" onclick="pressKey('1')">1</button>
    <button class="pin-key" onclick="pressKey('2')">2</button>
    <button class="pin-key" onclick="pressKey('3')">3</button>
    <button class="pin-key" onclick="pressKey('4')">4</button>
    <button class="pin-key" onclick="pressKey('5')">5</button>
    <button class="pin-key" onclick="pressKey('6')">6</button>
    <button class="pin-key" onclick="pressKey('7')">7</button>
    <button class="pin-key" onclick="pressKey('8')">8</button>
    <button class="pin-key" onclick="pressKey('9')">9</button>
    <div></div>
    <button class="pin-key" onclick="pressKey('0')">0</button>
    <button class="pin-key delete" onclick="deleteKey()">⌫</button>
  </div>

</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <div class="nav-item" onclick="window.location='dashboard.html'">🏠 Home</div>
  <div class="nav-item" onclick="window.location='transaction.html'">📜 History</div>
  <div class="nav-item" onclick="window.location='send.html'">✉️ Send</div>
  <div class="nav-item" onclick="window.location='fund.html'">💰 Fund</div>
  <div class="nav-item" onclick="logout()">🚪 Logout</div>
</nav>

<div id="toast" class="toast"></div>

<script src="js/app.js"></script>

<script>
let firstPin = "";
let currentPin = "";
let step = 1;

function updateDots() {
  for (let i = 0; i < 4; i++) {
    document.getElementById("dot"+i)
      .classList.toggle("filled", i < currentPin.length);
  }
}

function pressKey(n) {
  if (currentPin.length >= 4) return;
  currentPin += n;
  updateDots();

  if (currentPin.length === 4) {
    setTimeout(handleComplete, 300);
  }
}

function deleteKey() {
  currentPin = currentPin.slice(0, -1);
  updateDots();
}

function handleComplete() {
  if (step === 1) {
    firstPin = currentPin;
    currentPin = "";
    step = 2;

    document.getElementById("pinTitle").textContent = "Confirm your PIN";
    document.getElementById("pinSubtitle").textContent = "Enter PIN again";
    document.getElementById("pageTitle").textContent = "Confirm PIN";

    updateDots();

  } else {
    if (currentPin !== firstPin) {
      showToast("PINs don't match", "error");
      currentPin = "";
      firstPin = "";
      step = 1;
      updateDots();
    } else {
      submitPin();
    }
  }
}

async function submitPin() {
  try {
    const res = await fetch(`${API}/api/auth/set-pin`, {
      method:"POST",
      headers:{
        "Content-Type":"application/json",
        Authorization:`Bearer ${getToken()}`
      },
      body:JSON.stringify({ pin: currentPin })
    });

    if (res.ok) {
      showToast("PIN set!", "success");
      setTimeout(()=>window.location="dashboard.html",1200);
    } else {
      showToast("Failed", "error");
    }

  } catch {
    showToast("Connection error", "error");
  }
}
</script>

</body>
</html>
