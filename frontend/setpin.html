<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Festac — Set PIN</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#c9a84c">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .pin-dots {
      display: flex; justify-content: center; gap: 16px; margin: 28px 0;
    }
    .pin-dot {
      width: 16px; height: 16px; border-radius: 50%;
      border: 2px solid rgba(201,168,76,0.4);
      background: transparent; transition: all 0.2s;
    }
    .pin-dot.filled {
      background: var(--gold);
      border-color: var(--gold);
      box-shadow: 0 0 8px rgba(201,168,76,0.5);
    }

    .pin-pad {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 8px;
    }
    .pin-key {
      aspect-ratio: 1;
      border-radius: 16px;
      border: 1px solid var(--border-bright);
      background: var(--surface);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      gap: 2px;
      width: 100%;
    }
    .pin-key:active {
      background: var(--gold-dim);
      border-color: rgba(201,168,76,0.4);
      transform: scale(0.94);
    }
    .pin-key .key-sub {
      font-size: 9px;
      font-weight: 400;
      color: var(--text-muted);
      letter-spacing: 1px;
      font-family: 'DM Sans', sans-serif;
    }
    .pin-key.delete {
      background: var(--surface2);
      font-size: 18px;
    }
    .pin-key.empty {
      background: transparent;
      border: none;
      cursor: default;
      pointer-events: none;
    }
    .pin-key.confirm {
      background: var(--gold-gradient);
      color: #0a0a0a;
      border: none;
      font-size: 13px;
    }

    .pin-title {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 6px;
    }
    .pin-subtitle {
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.5;
    }

    .step-indicator {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 24px;
    }
    .step-pip {
      width: 28px; height: 4px;
      border-radius: 2px;
      background: var(--border-bright);
      transition: background 0.3s;
    }
    .step-pip.active { background: var(--gold); }
  </style>
</head>
<body>
  <div class="page has-nav">
    <div class="page-header fade-up">
      <a href="dashboard.html" class="back-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8a7e6e" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      </a>
      <h2 id="pageTitle">Set PIN</h2>
      <img src="icon.png" class="page-logo" alt="Festac">
    </div>

    <div class="page-body">

      <!-- Step indicator -->
      <div class="step-indicator fade-up">
        <div class="step-pip active" id="pip1"></div>
        <div class="step-pip" id="pip2"></div>
      </div>

      <!-- Title -->
      <div class="fade-up">
        <div class="pin-title" id="pinTitle">Create your PIN</div>
        <div class="pin-subtitle" id="pinSubtitle">Choose a 4-digit PIN to secure your transactions</div>
      </div>

      <!-- Dots -->
      <div class="pin-dots">
        <div class="pin-dot" id="dot0"></div>
        <div class="pin-dot" id="dot1"></div>
        <div class="pin-dot" id="dot2"></div>
        <div class="pin-dot" id="dot3"></div>
      </div>

      <!-- Keypad -->
      <div class="pin-pad fade-up">
        <button class="pin-key" onclick="pressKey('1')">1</button>
        <button class="pin-key" onclick="pressKey('2')">2<span class="key-sub">ABC</span></button>
        <button class="pin-key" onclick="pressKey('3')">3<span class="key-sub">DEF</span></button>
        <button class="pin-key" onclick="pressKey('4')">4<span class="key-sub">GHI</span></button>
        <button class="pin-key" onclick="pressKey('5')">5<span class="key-sub">JKL</span></button>
        <button class="pin-key" onclick="pressKey('6')">6<span class="key-sub">MNO</span></button>
        <button class="pin-key" onclick="pressKey('7')">7<span class="key-sub">PQRS</span></button>
        <button class="pin-key" onclick="pressKey('8')">8<span class="key-sub">TUV</span></button>
        <button class="pin-key" onclick="pressKey('9')">9<span class="key-sub">WXYZ</span></button>
        <button class="pin-key empty"></button>
        <button class="pin-key" onclick="pressKey('0')">0</button>
        <button class="pin-key delete" onclick="deleteKey()">⌫</button>
      </div>

    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="#5a5248" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Home</span>
    </a>
    <a href="transaction.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="#5a5248" stroke-width="2" stroke-linecap="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
      <span>History</span>
    </a>
    <a href="send.html" class="nav-item-center">
      <svg viewBox="0 0 24 24" fill="none" stroke="#0a0a0a" stroke-width="2.5" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </a>
    <a href="fund.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="#5a5248" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      <span>Fund</span>
    </a>
    <button class="nav-item" onclick="logout()">
      <svg viewBox="0 0 24 24" fill="none" stroke="#5a5248" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      <span>Logout</span>
    </button>
  </nav>

  <div id="toast" class="toast"></div>
  <script src="js/app.js"></script>
  <script>
    let firstPin = "";
    let currentPin = "";
    let step = 1; // 1 = enter, 2 = confirm

    function updateDots() {
      for (let i = 0; i < 4; i++) {
        document.getElementById("dot" + i).classList.toggle("filled", i < currentPin.length);
      }
    }

    function pressKey(num) {
      if (currentPin.length >= 4) return;
      currentPin += num;
      updateDots();
      if (currentPin.length === 4) {
        setTimeout(() => handleComplete(), 300);
      }
    }

    function deleteKey() {
      currentPin = currentPin.slice(0, -1);
      updateDots();
    }

    function handleComplete() {
      if (step === 1) {
        firstPin = currentPin;
        currentPin = "";
        step = 2;
        updateDots();
        document.getElementById("pinTitle").textContent = "Confirm your PIN";
        document.getElementById("pinSubtitle").textContent = "Enter your PIN again to confirm";
        document.getElementById("pageTitle").textContent = "Confirm PIN";
        document.getElementById("pip1").classList.remove("active");
        document.getElementById("pip2").classList.add("active");
      } else {
        if (currentPin !== firstPin) {
          showToast("PINs don't match. Try again.", "error");
          currentPin = "";
          firstPin = "";
          step = 1;
          updateDots();
          document.getElementById("pinTitle").textContent = "Create your PIN";
          document.getElementById("pinSubtitle").textContent = "Choose a 4-digit PIN to secure your transactions";
          document.getElementById("pageTitle").textContent = "Set PIN";
          document.getElementById("pip1").classList.add("active");
          document.getElementById("pip2").classList.remove("active");
        } else {
          submitPin();
        }
      }
    }

    async function submitPin() {
      try {
        const res = await fetch(`${API}/api/auth/set-pin`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${getToken()}`
          },
          body: JSON.stringify({ pin: currentPin })
        });
        if (res.ok) {
          showToast("PIN set successfully!", "success");
          setTimeout(() => window.location = "dashboard.html", 1500);
        } else {
          const msg = await res.text();
          showToast(msg || "Failed to set PIN", "error");
          currentPin = "";
          firstPin = "";
          step = 1;
          updateDots();
        }
      } catch (err) {
        showToast("Connection error", "error");
        currentPin = "";
        updateDots();
      }
    }
  </script>
</body>
</html>
