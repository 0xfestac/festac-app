<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Festac — Send Money</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#c9a84c">
  <link rel="stylesheet" href="css/style.css">

  <style>
    body {
      background:#0a0a0a;
      color:#fff;
      font-family:'Syne',sans-serif;
      margin:0;
    }

    .top-header {
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:16px 20px;
      background:#121212;
      border-bottom:1px solid #222;
    }

    .back-btn {
      color:#c9a84c;
      font-size:18px;
      cursor:pointer;
    }

    .title {
      font-weight:700;
      font-size:16px;
    }

    .send-card {
      background:#1a1a1a;
      margin:20px;
      padding:20px;
      border-radius:14px;
    }

    .field {
      margin-bottom:16px;
    }

    .field label {
      font-size:12px;
      color:#aaa;
      display:block;
      margin-bottom:6px;
    }

    .field input {
      width:100%;
      padding:14px;
      border-radius:12px;
      border:1px solid #222;
      background:#121212;
      color:#fff;
      outline:none;
    }

    .send-btn {
      width:100%;
      padding:14px;
      border-radius:12px;
      background:#c9a84c;
      color:#000;
      font-weight:700;
      border:none;
      margin-top:10px;
      cursor:pointer;
    }

    /* Bottom nav (same as dashboard) */
    .bottom-nav {
      position:fixed;
      bottom:0;
      width:100%;
      display:flex;
      justify-content:space-around;
      background:#121212;
      padding:8px 0;
      border-top:1px solid #222;
    }

    .nav-item {
      font-size:12px;
      color:#888;
      text-align:center;
      cursor:pointer;
    }

    .nav-item.active {
      color:#c9a84c;
    }
  </style>
</head>

<body>

<!-- Header -->
<div class="top-header">
  <div class="back-btn" onclick="window.location='dashboard.html'">←</div>
  <div class="title">Send Money</div>
  <div></div>
</div>

<!-- Form -->
<div class="send-card">

  <div class="field">
    <label>Recipient email</label>
    <input id="toEmail" type="email" placeholder="friend@example.com">
  </div>

  <div class="field">
    <label>Amount (USD)</label>
    <input id="amount" type="number" placeholder="0.00">
  </div>

  <button class="send-btn" onclick="openPinModal()">Continue</button>

</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <div class="nav-item" onclick="window.location='dashboard.html'">🏠 Home</div>
  <div class="nav-item" onclick="window.location='transaction.html'">📜 History</div>
  <div class="nav-item active">✉️ Send</div>
  <div class="nav-item" onclick="window.location='fund.html'">💰 Fund</div>
  <div class="nav-item" onclick="logout()">🚪 Logout</div>
</nav>

<!-- PIN Modal -->
<div id="pinModal" class="modal">
  <div class="modal-sheet">
    <p class="modal-title">Enter your PIN</p>

    <input id="pinInput" type="password" maxlength="4" placeholder="••••"
      style="
        width:100%;
        padding:14px;
        border-radius:12px;
        border:1px solid #222;
        background:#121212;
        color:#fff;
        margin-bottom:12px;
      ">

    <button class="send-btn" onclick="confirmSend()">Confirm</button>
    <button class="nav-item" onclick="closeModal()">Cancel</button>
  </div>
</div>

<div id="toast" class="toast"></div>

<script src="js/app.js"></script>
</body>
</html>
