<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Festac — Send Money</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#00e5a0">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page">
    <div class="page-header fade-up">
      <a href="dashboard.html" class="back-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8898aa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </a>
      <h2>Send Money</h2>
      <img src="icon.png" class="page-logo" alt="Festac">
    </div>

    <div class="page-body">
      <div class="card fade-up">
        <div class="field">
          <label>Recipient email</label>
          <input id="toEmail" type="email" placeholder="friend@example.com">
        </div>
        <div class="field">
          <label>Amount (USD)</label>
          <input id="amount" type="number" placeholder="0.00" min="0.01" max="50">
        </div>
        <button class="btn btn-primary" onclick="openPinModal()" style="margin-top:8px">Continue</button>
      </div>
    </div>
  </div>

  <div id="pinModal" class="modal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <p class="modal-title">Enter your PIN</p>
      <p class="modal-subtitle">Confirm this transaction with your 4-digit PIN</p>
      <div class="field">
        <input id="pinInput" type="password" maxlength="4" placeholder="••••" class="pin-input">
      </div>
      <button class="btn btn-primary" onclick="confirmSend()">Confirm Transfer</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <script src="js/app.js"></script>
</body>
</html>
