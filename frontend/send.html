<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Festac — Send Money</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#c9a84c">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page has-nav">
    <div class="page-header fade-up">
      <a href="dashboard.html" class="back-btn">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#8a7e6e" stroke-width="2" stroke-linecap="round"><polyline points="15 18 9 12 15 6"/></svg>
      </a>
      <h2>Send Money</h2>
      <img src="icon.png" class="page-logo" alt="Festac">
    </div>
    <div class="page-body">
      <div class="card fade-up">
        <div class="field">
          <label>Recipient email</label>
          <input id="toEmail" type="email" placeholder="friend@example.com">
        </div>
        <div class="field">
          <label>Amount (USD)</label>
          <input id="amount" type="number" placeholder="0.00" min="0.01" max="50">
        </div>
        <button class="btn btn-primary" onclick="openPinModal()" style="margin-top:8px">Continue</button>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="#5a5248" stroke-width="2" stroke-linecap="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      <span>Home</span>
    </a>
    <a href="transaction.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="#5a5248" stroke-width="2" stroke-linecap="round"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
      <span>History</span>
    </a>
    <a href="send.html" class="nav-item-center">
      <svg viewBox="0 0 24 24" fill="none" stroke="#0a0a0a" stroke-width="2.5" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </a>
    <a href="fund.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="none" stroke="#5a5248" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      <span>Fund</span>
    </a>
    <button class="nav-item" onclick="logout()">
      <svg viewBox="0 0 24 24" fill="none" stroke="#5a5248" stroke-width="2" stroke-linecap="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      <span>Logout</span>
    </button>
  </nav>

  <div id="pinModal" class="modal">
    <div class="modal-sheet">
      <div class="modal-handle"></div>
      <p class="modal-title">Enter your PIN</p>
      <p class="modal-subtitle">Confirm this transaction with your 4-digit PIN</p>
      <div class="field">
        <input id="pinInput" type="password" maxlength="4" placeholder="••••" class="pin-input">
      </div>
      <button class="btn btn-primary" onclick="confirmSend()">Confirm Transfer</button>
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <script src="js/app.js"></script>
</body>
</html>
