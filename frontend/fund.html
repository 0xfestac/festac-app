<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Festac — Add Money</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#c9a84c">
  <link rel="stylesheet" href="css/style.css">

  <style>
    body {
      background:#0a0a0a;
      color:#fff;
      font-family:'Syne',sans-serif;
      margin:0;
    }

    /* Header (match dashboard) */
    .top-header {
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:16px 20px;
      background:#121212;
      border-bottom:1px solid #222;
    }

    .back-btn {
      color:#c9a84c;
      font-size:18px;
      cursor:pointer;
    }

    .title {
      font-weight:700;
      font-size:16px;
    }

    /* Tabs */
    .fund-tabs {
      display:flex;
      gap:8px;
      padding:20px;
    }

    .fund-tab {
      flex:1;
      padding:10px;
      border-radius:10px;
      border:1px solid #222;
      background:#121212;
      color:#888;
      font-size:12px;
      cursor:pointer;
    }

    .fund-tab.active {
      background:rgba(201,168,76,0.2);
      color:#c9a84c;
      border-color:#c9a84c;
    }

    /* Panels */
    .fund-panel { display:none; padding:0 20px 20px; }
    .fund-panel.active { display:block; }

    /* Cards */
    .payment-card {
      background:#1a1a1a;
      border-radius:12px;
      margin-bottom:12px;
      padding:14px;
    }

    .payment-header {
      display:flex;
      justify-content:space-between;
      align-items:center;
      cursor:pointer;
    }

    .payment-title {
      font-weight:700;
    }

    .payment-body {
      margin-top:12px;
      display:none;
    }

    .payment-card.open .payment-body {
      display:block;
    }

    /* Inputs */
    input, select {
      width:100%;
      padding:14px;
      border-radius:12px;
      border:1px solid #222;
      background:#121212;
      color:#fff;
      margin-bottom:10px;
    }

    /* Button */
    .btn-gold {
      width:100%;
      padding:14px;
      border-radius:12px;
      background:#c9a84c;
      color:#000;
      font-weight:700;
      border:none;
      cursor:pointer;
    }

    /* Bottom nav (match dashboard) */
    .bottom-nav {
      position:fixed;
      bottom:0;
      width:100%;
      display:flex;
      justify-content:space-around;
      background:#121212;
      padding:8px 0;
      border-top:1px solid #222;
    }

    .nav-item {
      font-size:12px;
      color:#888;
      text-align:center;
    }

    .nav-item.active {
      color:#c9a84c;
    }
  </style>
</head>

<body>

<!-- Header -->
<div class="top-header">
  <div class="back-btn" onclick="window.location='dashboard.html'">←</div>
  <div class="title">Add Money</div>
  <div></div>
</div>

<!-- Tabs -->
<div class="fund-tabs">
  <button class="fund-tab active" onclick="switchTab('crypto')">🔐 Crypto</button>
  <button class="fund-tab" onclick="switchTab('bank')">🏦 Bank</button>
  <button class="fund-tab" onclick="switchTab('friend')">👤 Friend</button>
</div>

<!-- Crypto -->
<div class="fund-panel active" id="panel-crypto">
  <div class="payment-card" onclick="toggleCard('crypto')">
    <div class="payment-header">
      <span class="payment-title">USDT / TON</span>
      <span>▼</span>
    </div>

    <div class="payment-body">
      <p style="color:#aaa;font-size:12px;margin-bottom:10px;">
        Send crypto and submit transaction hash
      </p>

      <input placeholder="Amount">
      <input placeholder="Transaction hash">

      <button class="btn-gold">Submit</button>
    </div>
  </div>
</div>

<!-- Bank -->
<div class="fund-panel" id="panel-bank">
  <div class="payment-card" onclick="toggleCard('bank')">
    <div class="payment-header">
      <span class="payment-title">Bank Transfer</span>
      <span>▼</span>
    </div>

    <div class="payment-body">
      <p style="color:#aaa;font-size:12px;">
        Bank: Moniepoint  
        <br>Account: 8109731698
      </p>

      <input placeholder="Amount (₦)">
      <input placeholder="Your Name">

      <button class="btn-gold">Submit</button>
    </div>
  </div>
</div>

<!-- Friend -->
<div class="fund-panel" id="panel-friend">
  <div class="payment-card">
    <p style="color:#aaa;font-size:12px;">
      Ask a friend to send money to your email.
    </p>
  </div>
</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <div class="nav-item" onclick="window.location='dashboard.html'">🏠 Home</div>
  <div class="nav-item" onclick="window.location='transaction.html'">📜 History</div>
  <div class="nav-item" onclick="window.location='send.html'">✉️ Send</div>
  <div class="nav-item active">💰 Fund</div>
  <div class="nav-item" onclick="logout()">🚪 Logout</div>
</nav>

<script src="js/app.js"></script>

<script>
function switchTab(tab) {
  document.querySelectorAll(".fund-tab").forEach((t, i) => {
    t.classList.toggle("active", ["crypto","bank","friend"][i] === tab);
  });

  document.querySelectorAll(".fund-panel").forEach(p => p.classList.remove("active"));
  document.getElementById("panel-" + tab).classList.add("active");
}

function toggleCard(id) {
  const panel = document.getElementById("panel-" + id);
  const card = panel.querySelector(".payment-card");
  card.classList.toggle("open");
}
</script>

</body>
</html>
