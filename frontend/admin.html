<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Festac — Admin</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .admin-header {
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .admin-title {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 800;
      background: var(--gold-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .admin-body { padding: 20px; }
    .request-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 14px;
      position: relative;
      overflow: hidden;
    }
    .request-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,0.3), transparent);
    }
    .request-card.approved { border-color: rgba(0,201,122,0.3); }
    .request-card.rejected { border-color: rgba(255,77,106,0.3); }
    .req-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 12px;
    }
    .req-name {
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--text);
    }
    .req-email {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }
    .req-amount {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 800;
      color: var(--gold);
    }
    .req-details {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }
    .req-detail-item {}
    .req-detail-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 3px;
    }
    .req-detail-value {
      font-size: 13px;
      color: var(--text);
      font-weight: 500;
    }
    .req-actions {
      display: flex;
      gap: 10px;
    }
    .btn-approve {
      flex: 1; padding: 11px; border-radius: 10px; border: none;
      background: rgba(0,201,122,0.15); color: #00c97a;
      border: 1px solid rgba(0,201,122,0.3);
      font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-approve:hover { background: rgba(0,201,122,0.25); }
    .btn-reject {
      flex: 1; padding: 11px; border-radius: 10px; border: none;
      background: var(--danger-dim); color: var(--danger);
      border: 1px solid rgba(255,77,106,0.3);
      font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-reject:hover { background: rgba(255,77,106,0.2); }
    .status-badge {
      padding: 4px 10px; border-radius: 20px;
      font-size: 11px; font-weight: 600;
      font-family: 'Syne', sans-serif;
    }
    .status-pending { background: var(--gold-dim); color: var(--gold); border: 1px solid rgba(201,168,76,0.3); }
    .status-approved { background: rgba(0,201,122,0.12); color: #00c97a; border: 1px solid rgba(0,201,122,0.3); }
    .status-rejected { background: var(--danger-dim); color: var(--danger); border: 1px solid rgba(255,77,106,0.3); }
    .req-time {
      font-size: 11px;
      color: var(--text-muted);
      margin-bottom: 12px;
    }
    .filter-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    .filter-tab {
      padding: 8px 16px; border-radius: 20px;
      border: 1px solid var(--border-bright);
      background: var(--surface); color: var(--text-muted);
      font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
    }
    .filter-tab.active {
      background: var(--gold-dim);
      border-color: rgba(201,168,76,0.4);
      color: var(--gold);
    }
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--text-muted);
    }
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px;
      text-align: center;
    }
    .stat-value {
      font-family: 'Syne', sans-serif;
      font-size: 20px;
      font-weight: 800;
      color: var(--gold);
    }
    .stat-label {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="admin-header">
      <span class="admin-title">Admin Panel</span>
      <button class="nav-logout" onclick="logout()">Logout</button>
    </div>

    <div class="admin-body">

      <!-- Stats -->
      <div class="stats-row" id="statsRow">
        <div class="stat-card">
          <div class="stat-value" id="statPending">0</div>
          <div class="stat-label">Pending</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statApproved">0</div>
          <div class="stat-label">Approved</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="statRejected">0</div>
          <div class="stat-label">Rejected</div>
        </div>
      </div>

      <!-- Filter tabs -->
      <div class="filter-tabs">
        <button class="filter-tab active" onclick="filterRequests('all', this)">All</button>
        <button class="filter-tab" onclick="filterRequests('pending', this)">Pending</button>
        <button class="filter-tab" onclick="filterRequests('approved', this)">Approved</button>
        <button class="filter-tab" onclick="filterRequests('rejected', this)">Rejected</button>
      </div>

      <!-- Requests list -->
      <div id="requestsList"></div>

    </div>
  </div>

  <div id="toast" class="toast"></div>
  <script src="js/app.js"></script>
  <script>
    let allRequests = [];
    let currentFilter = "all";

    async function loadRequests() {
      try {
        const res = await fetch(`${API}/admin/fund-requests`, {
          headers: { Authorization: `Bearer ${getToken()}` }
        });
        if (res.status === 403) {
          showToast("Access denied", "error");
          setTimeout(() => window.location = "index.html", 1500);
          return;
        }
        allRequests = await res.json();
        updateStats();
        renderRequests(currentFilter);
      } catch (err) {
        showToast("Failed to load requests", "error");
      }
    }

    function updateStats() {
      document.getElementById("statPending").textContent = allRequests.filter(r => r.status === "pending").length;
      document.getElementById("statApproved").textContent = allRequests.filter(r => r.status === "approved").length;
      document.getElementById("statRejected").textContent = allRequests.filter(r => r.status === "rejected").length;
    }

    function filterRequests(filter, btn) {
      currentFilter = filter;
      document.querySelectorAll(".filter-tab").forEach(t => t.classList.remove("active"));
      btn.classList.add("active");
      renderRequests(filter);
    }

    function renderRequests(filter) {
      const list = document.getElementById("requestsList");
      const filtered = filter === "all" ? allRequests : allRequests.filter(r => r.status === filter);

      if (!filtered.length) {
        list.innerHTML = `<div class="empty-state"><p>No ${filter === "all" ? "" : filter} requests</p></div>`;
        return;
      }

      list.innerHTML = filtered.map(req => {
        const date = new Date(req.createdAt).toLocaleString("en-GB", {
          day: "numeric", month: "short", hour: "2-digit", minute: "2-digit"
        });
        const actions = req.status === "pending" ? `
          <div class="req-actions">
            <button class="btn-approve" onclick="approveRequest('${req._id}')">✓ Approve</button>
            <button class="btn-reject" onclick="rejectRequest('${req._id}')">✕ Reject</button>
          </div>` : "";

        return `
          <div class="request-card ${req.status}" id="req-${req._id}">
            <div class="req-header">
              <div>
                <div class="req-name">${req.userName}</div>
                <div class="req-email">${req.userEmail}</div>
              </div>
              <div>
                <div class="req-amount">₦${req.amount.toLocaleString()}</div>
                <span class="status-badge status-${req.status}">${req.status}</span>
              </div>
            </div>
            <div class="req-time">${date}</div>
            <div class="req-details">
              <div class="req-detail-item">
                <div class="req-detail-label">Sender Name</div>
                <div class="req-detail-value">${req.senderName}</div>
              </div>
              <div class="req-detail-item">
                <div class="req-detail-label">Sender Bank</div>
                <div class="req-detail-value">${req.senderBank}</div>
              </div>
              <div class="req-detail-item" style="grid-column:1/-1">
                <div class="req-detail-label">Reference</div>
                <div class="req-detail-value">${req.reference}</div>
              </div>
            </div>
            ${actions}
          </div>`;
      }).join("");
    }

    async function approveRequest(id) {
      if (!confirm("Approve this request and credit the user's wallet?")) return;
      try {
        const res = await fetch(`${API}/admin/fund-requests/${id}/approve`, {
          method: "POST",
          headers: { Authorization: `Bearer ${getToken()}` }
        });
        const data = await res.json();
        if (res.ok) {
          showToast("Approved! Wallet credited", "success");
          loadRequests();
        } else {
          showToast(data.message || "Failed", "error");
        }
      } catch (err) {
        showToast("Connection error", "error");
      }
    }

    async function rejectRequest(id) {
      const note = prompt("Reason for rejection (optional):");
      try {
        const res = await fetch(`${API}/admin/fund-requests/${id}/reject`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${getToken()}`
          },
          body: JSON.stringify({ note: note || "" })
        });
        const data = await res.json();
        if (res.ok) {
          showToast("Request rejected", "error");
          loadRequests();
        } else {
          showToast(data.message || "Failed", "error");
        }
      } catch (err) {
        showToast("Connection error", "error");
      }
    }

    loadRequests();
  </script>
</body>
</html>
