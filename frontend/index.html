<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Festac — Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#c9a84c">
  <link rel="stylesheet" href="css/style.css">

  <style>
    body {
      background:#0a0a0a;
      color:#fff;
      font-family:'Syne',sans-serif;
      margin:0;
    }

    .auth-container {
      min-height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      padding:24px;
    }

    .auth-logo {
      text-align:center;
      margin-bottom:30px;
    }

    .logo-img {
      width:60px;
      height:60px;
      margin-bottom:10px;
    }

    .auth-logo h1 {
      font-size:26px;
      margin:0;
      font-weight:800;
      background:linear-gradient(135deg,#f0c040,#c9a84c);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
    }

    .auth-logo p {
      color:#888;
      font-size:13px;
      margin-top:4px;
    }

    .card {
      background:#1a1a1a;
      padding:20px;
      border-radius:14px;
    }

    .card-title {
      font-weight:700;
      margin-bottom:16px;
    }

    input {
      width:100%;
      padding:14px;
      border-radius:12px;
      border:1px solid #222;
      background:#121212;
      color:#fff;
      margin-top:6px;
      box-sizing:border-box;
    }

    input:focus {
      outline:none;
      border-color:#c9a84c;
    }

    label { font-size:12px; color:#aaa; }

    .field { margin-bottom:14px; }

    .btn-primary {
      width:100%;
      padding:14px;
      border-radius:12px;
      border:none;
      background:#c9a84c;
      color:#000;
      font-weight:700;
      cursor:pointer;
      margin-top:10px;
      font-size:15px;
    }

    .btn-primary:active { transform:scale(0.97); }
    .btn-primary:disabled { opacity:0.6; cursor:not-allowed; }

    .auth-link {
      text-align:center;
      font-size:13px;
      margin-top:18px;
      color:#888;
    }

    .auth-link a { color:#c9a84c; font-weight:600; }

    .loading-overlay {
      position:fixed;
      inset:0;
      background:rgba(0,0,0,0.6);
      display:none;
      align-items:center;
      justify-content:center;
      z-index:999;
    }

    .loading-overlay.show { display:flex; }

    .spinner {
      width:40px;
      height:40px;
      border:3px solid #333;
      border-top-color:#c9a84c;
      border-radius:50%;
      animation:spin 1s linear infinite;
    }

    @keyframes spin { to { transform:rotate(360deg); } }

    /* Toast */
    #toast {
      position:fixed;
      top:24px;
      left:50%;
      transform:translateX(-50%);
      padding:12px 24px;
      border-radius:20px;
      font-size:14px;
      font-weight:600;
      z-index:9999;
      display:none;
      white-space:nowrap;
      box-shadow:0 4px 20px rgba(0,0,0,0.4);
    }

    #toast.success {
      background:#c9a84c;
      color:#000;
    }

    #toast.error {
      background:#e53e3e;
      color:#fff;
    }
  </style>
</head>

<body>

<div class="auth-container">

  <div class="auth-logo">
    <img src="icon.png" class="logo-img">
    <h1>Festac</h1>
    <p>Your money, simplified</p>
  </div>

  <div class="card">
    <div class="card-title">Welcome back</div>

    <div class="field">
      <label>Email</label>
      <input id="email" type="email" placeholder="you@example.com">
    </div>

    <div class="field">
      <label>Password</label>
      <input id="password" type="password" placeholder="******">
    </div>

    <button class="btn-primary" id="loginBtn" onclick="handleLogin()">Sign in</button>
  </div>

  <div class="auth-link">
    Don't have an account? <a href="register.html">Create one</a>
  </div>

</div>

<div id="loadingOverlay" class="loading-overlay">
  <div class="spinner"></div>
</div>

<div id="toast"></div>

<script src="js/app.js"></script>

<script>
  function showToast(msg, type = "success") {
    const toast = document.getElementById("toast");
    toast.textContent = msg;
    toast.className = type;
    toast.style.display = "block";
    setTimeout(() => toast.style.display = "none", 3000);
  }

  async function handleLogin() {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();
    const btn = document.getElementById("loginBtn");
    const overlay = document.getElementById("loadingOverlay");

    if (!email || !password) {
      showToast("⚠️ Enter email and password", "error");
      return;
    }

    btn.disabled = true;
    overlay.classList.add("show");

    try {
      const res = await fetch(`${API}/api/auth/login`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email, password })
      });

      const data = await res.json();

      if (res.ok) {
        setToken(data.token);
        showToast("✅ Login successful!");
        setTimeout(() => window.location = "dashboard.html", 1200);
      } else {
        showToast(data.message || "❌ Login failed", "error");
      }

    } catch {
      showToast("❌ Connection error", "error");
    }

    btn.disabled = false;
    overlay.classList.remove("show");
  }

  // Allow Enter key to login
  document.addEventListener("keydown", function(e) {
    if (e.key === "Enter") handleLogin();
  });
</script>

</body>
</html>
