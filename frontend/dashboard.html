<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Festac — Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="css/style.css">

<style>
body { background:#0a0a0a; color:#fff; font-family:sans-serif; margin:0; }

.top-header {
  display:flex; align-items:center;
  padding:16px 20px; background:#121212;
}

.balance-card {
  background:#1a1a1a; margin:20px;
  padding:20px; border-radius:12px;
}

.balance-amount { font-size:28px; font-weight:bold; }

.bottom-nav {
  position:fixed; bottom:0; width:100%;
  display:flex; justify-content:space-around;
  background:#121212; padding:8px 0;
}
</style>
</head>

<body>

<!-- HEADER WITH PROFILE -->
<div class="top-header">
  <img id="profilePic"
       src="https://via.placeholder.com/40"
       style="width:40px;height:40px;border-radius:50%;margin-right:10px;" />

  <div>
    <div>Good day,</div>
    <div id="greetingName"></div>
  </div>
</div>

<!-- UPLOAD -->
<input type="file" id="uploadPic" accept="image/*" style="margin:10px;">

<!-- BALANCE -->
<div class="balance-card">
  <div>Wallet Balance</div>
  <div id="balance">$0.00</div>

  <button onclick="goFund()">Fund</button>
  <button onclick="goSend()">Send</button>
</div>

<!-- ADMIN -->
<button id="adminBtn" style="display:none;" onclick="goAdmin()">Admin Panel</button>

<!-- TRANSACTIONS -->
<div>
  <h3>Recent Transactions</h3>
  <div id="recentList"></div>
</div>

<!-- NAV -->
<div class="bottom-nav">
  <div onclick="location='dashboard.html'">Home</div>
  <div onclick="location='transaction.html'">History</div>
  <div onclick="location='send.html'">Send</div>
  <div onclick="location='fund.html'">Fund</div>
  <div onclick="logout()">Logout</div>
</div>

<script src="js/app.js"></script>

<script>
function loadUserInfo() {
  const token = localStorage.getItem("token");
  const nameEl = document.getElementById("greetingName");

  if (!token) {
    nameEl.textContent = "Guest";
    return;
  }

  try {
    const payload = JSON.parse(atob(token.split('.')[1]));
    nameEl.textContent = payload.name || payload.email;

    if (payload.role === "admin") {
      document.getElementById("adminBtn").style.display = "block";
    }
  } catch {
    nameEl.textContent = "User";
  }
}

loadUserInfo();
</script>

</body>
</html>
