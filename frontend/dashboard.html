<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Festac — Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body {
      background-color: #0a0a0a;
      color: #fff;
      font-family: 'Syne', sans-serif;
      margin: 0;
    }

    .top-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 20px;
      background: #121212;
      border-bottom: 1px solid #222;
    }

    .greeting-text { font-size: 14px; color: #aaa; }
    .greeting-name { font-size: 18px; font-weight: 700; }

    .profile-pic-wrapper {
      position: relative;
      cursor: pointer;
      width: 44px;
      height: 44px;
    }

    .profile-pic-wrapper img {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #c9a84c;
      display: block;
    }

    .profile-pic-wrapper::after {
      content: '📷';
      position: absolute;
      bottom: -2px;
      right: -2px;
      font-size: 14px;
      background: #c9a84c;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 18px;
      text-align: center;
    }

    .balance-card {
      background: #1a1a1a;
      margin: 20px;
      padding: 20px;
      border-radius: 12px;
    }

    .balance-label { font-size: 12px; color: #aaa; letter-spacing: 1px; }

    .balance-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .balance-amount {
      font-size: 28px;
      font-weight: 700;
      flex: 1;
    }

    .eye-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: #c9a84c;
      font-size: 22px;
      line-height: 1;
    }

    .balance-footer {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    .bal-action-btn {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      font-size: 15px;
    }

    .gold { background: #c9a84c; color: #000; }
    .outline {
      background: #121212;
      border: 1px solid #c9a84c;
      color: #c9a84c;
    }

    /* ── Quick actions grid ── */
    .quick-actions {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      padding: 0 20px;
      margin: 20px 0;
    }

    .quick-btn {
      background: rgba(201,168,76,0.1);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 14px;
      padding: 14px 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
    }

    .quick-btn:active {
      transform: scale(0.96);
      background: rgba(201,168,76,0.2);
    }

    .quick-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: rgba(201,168,76,0.15);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .quick-icon svg {
      width: 18px;
      height: 18px;
    }

    .quick-label {
      font-size: 11px;
      font-weight: 600;
      color: #c9a84c;
      text-align: center;
      font-family: 'Syne', sans-serif;
    }

    /* ── Admin button ── */
    #adminBtn {
      display: none;
      margin: 0 20px 20px;
      padding: 14px 18px;
      border-radius: 14px;
      background: linear-gradient(135deg, rgba(201,168,76,0.15), rgba(201,168,76,0.05));
      border: 1px solid rgba(201,168,76,0.35);
      color: #c9a84c;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 14px;
      cursor: pointer;
      text-align: left;
      width: calc(100% - 40px);
      display: none;
      align-items: center;
      gap: 12px;
      position: relative;
      overflow: hidden;
      transition: all 0.2s;
    }

    #adminBtn::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,0.5), transparent);
    }

    #adminBtn:active {
      transform: scale(0.98);
      background: rgba(201,168,76,0.2);
    }

    .admin-icon {
      width: 38px;
      height: 38px;
      border-radius: 10px;
      background: rgba(201,168,76,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .admin-text { flex: 1; }
    .admin-title { font-size: 14px; font-weight: 700; color: #c9a84c; }
    .admin-sub { font-size: 11px; color: rgba(201,168,76,0.6); margin-top: 2px; font-weight: 400; }

    .admin-arrow {
      color: rgba(201,168,76,0.5);
      font-size: 18px;
    }

    .section {
      padding: 0 20px 80px;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      max-width: 430px;
      display: flex;
      justify-content: space-around;
      background: #121212;
      padding: 8px 0;
      border-top: 1px solid #222;
    }

    .nav-item { font-size: 12px; color: #888; cursor: pointer; padding: 6px 0; }
    .nav-item.active { color: #c9a84c; }

    #uploadToast {
      display: none;
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #c9a84c;
      color: #000;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
      z-index: 999;
      white-space: nowrap;
    }
  </style>
</head>
<body>

<div id="uploadToast"></div>
<input type="file" id="uploadPic" accept="image/*" hidden>

<!-- HEADER -->
<div class="top-header">
  <div class="profile-pic-wrapper" onclick="document.getElementById('uploadPic').click()" title="Change profile picture">
    <img id="profilePic" src="icon.png" onerror="this.src='https://via.placeholder.com/44/c9a84c/000?text=F'" />
  </div>
  <div style="flex:1;">
    <div class="greeting-text">Good day,</div>
    <div class="greeting-name" id="greetingName"></div>
  </div>
</div>

<!-- BALANCE -->
<div class="balance-card">
  <div class="balance-label">WALLET BALANCE</div>
  <div class="balance-row">
    <div class="balance-amount" id="balance">$0.00</div>
    <button class="eye-btn" id="eyeBtn" onclick="toggleBalance()">👁️</button>
  </div>
  <div class="balance-footer">
    <button class="bal-action-btn gold" onclick="goFund()">Fund</button>
    <button class="bal-action-btn outline" onclick="goSend()">Send</button>
  </div>
</div>

<!-- QUICK ACTIONS — 3 per row -->
<div class="quick-actions">
  <button class="quick-btn" onclick="goSend()">
    <div class="quick-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#c9a84c" stroke-width="2" stroke-linecap="round">
        <line x1="22" y1="2" x2="11" y2="13"/>
        <polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </div>
    <span class="quick-label">Send</span>
  </button>
  <button class="quick-btn" onclick="goFund()">
    <div class="quick-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#c9a84c" stroke-width="2" stroke-linecap="round">
        <circle cx="12" cy="12" r="10"/>
        <line x1="12" y1="8" x2="12" y2="16"/>
        <line x1="8" y1="12" x2="16" y2="12"/>
      </svg>
    </div>
    <span class="quick-label">Add Money</span>
  </button>
  <button class="quick-btn" onclick="goTransactions()">
    <div class="quick-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#c9a84c" stroke-width="2" stroke-linecap="round">
        <rect x="2" y="5" width="20" height="14" rx="2"/>
        <line x1="2" y1="10" x2="22" y2="10"/>
      </svg>
    </div>
    <span class="quick-label">History</span>
  </button>
  <button class="quick-btn" onclick="window.location='setpin.html'">
    <div class="quick-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#c9a84c" stroke-width="2" stroke-linecap="round">
        <rect x="3" y="11" width="18" height="11" rx="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
    </div>
    <span class="quick-label">Set PIN</span>
  </button>
  <button class="quick-btn" onclick="window.location='verify.html'">
    <div class="quick-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#c9a84c" stroke-width="2" stroke-linecap="round">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
        <polyline points="22 4 12 14.01 9 11.01"/>
      </svg>
    </div>
    <span class="quick-label">Verify TX</span>
  </button>
</div>

<!-- ADMIN PANEL BUTTON — only shows for admins -->
<button id="adminBtn" onclick="goAdmin()">
  <div class="admin-icon">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#c9a84c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
    </svg>
  </div>
  <div class="admin-text">
    <div class="admin-title">Admin Panel</div>
    <div class="admin-sub">Manage fund requests & users</div>
  </div>
  <div class="admin-arrow">›</div>
</button>

<!-- TRANSACTIONS -->
<div class="section">
  <div class="section-header">
    <span>Recent Transactions</span>
    <a href="transaction.html" style="color:#c9a84c;text-decoration:none;font-size:13px">See all</a>
  </div>
  <div id="recentList"></div>
</div>

<!-- NAV -->
<div class="bottom-nav">
  <div class="nav-item active" onclick="location='dashboard.html'">Home</div>
  <div class="nav-item" onclick="location='transaction.html'">History</div>
  <div class="nav-item" onclick="location='send.html'">Send</div>
  <div class="nav-item" onclick="location='fund.html'">Fund</div>
  <div class="nav-item" onclick="logout()">Logout</div>
</div>

<div id="toast" class="toast"></div>
<script src="js/app.js"></script>
<script>
  let realBalance = "$0.00";
  let balanceHidden = localStorage.getItem("balanceHidden") === "true";

  function toggleBalance() {
    balanceHidden = !balanceHidden;
    localStorage.setItem("balanceHidden", balanceHidden);
    applyBalanceState();
  }

  function applyBalanceState() {
    document.getElementById("balance").textContent = balanceHidden ? "••••••" : realBalance;
    document.getElementById("eyeBtn").textContent = balanceHidden ? "🙈" : "👁️";
  }

  function showToast(msg) {
    const toast = document.getElementById("uploadToast");
    toast.textContent = msg;
    toast.style.display = "block";
    setTimeout(() => toast.style.display = "none", 3000);
  }

  const uploadInput = document.getElementById("uploadPic");
  const profilePic = document.getElementById("profilePic");
  const savedPic = localStorage.getItem("profilePic");
  if (savedPic) profilePic.src = savedPic;

  uploadInput.addEventListener("change", function () {
    const file = this.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function (e) {
      profilePic.src = e.target.result;
      localStorage.setItem("profilePic", e.target.result);
      showToast("✅ Profile picture updated!");
    };
    reader.readAsDataURL(file);
    this.value = "";
  });

  function loadUserInfo() {
    const token = localStorage.getItem("token");
    const nameEl = document.getElementById("greetingName");
    if (!token) { nameEl.textContent = "Guest"; return; }
    try {
      const payload = JSON.parse(atob(token.split('.')[1]));
      nameEl.textContent = payload.name || payload.email || "User";
      if (payload.role === "admin") {
        const btn = document.getElementById("adminBtn");
        btn.style.display = "flex";
      }
    } catch { nameEl.textContent = "User"; }
  }

  async function loadBalance() {
    const el = document.getElementById("balance");
    if (!el) return;
    try {
      const res = await fetch(`${API}/api/wallet/balance`, {
        headers: { Authorization: `Bearer ${getToken()}` }
      });
      const data = await res.json();
      if (res.ok) {
        realBalance = "$" + Number(data.balance).toFixed(2);
        applyBalanceState();
      }
    } catch (err) {
      console.log("Balance error:", err);
    }
  }

  function goAdmin() { window.location = "admin.html"; }

  applyBalanceState();
  loadUserInfo();
  loadBalance();
  loadRecentTransactions();
</script>

</body>
</html>
