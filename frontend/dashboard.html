<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Festac — Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/style.css">

  <style>
    body {
      background-color: #0a0a0a;
      color: #fff;
      font-family: 'Syne', sans-serif;
      margin: 0;
    }

    .top-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 20px;
      background: #121212;
      border-bottom: 1px solid #222;
    }

    .greeting-text { font-size: 14px; color: #aaa; }
    .greeting-name { font-size: 18px; font-weight: 700; }

    .profile-pic-wrapper {
      position: relative;
      cursor: pointer;
      width: 44px;
      height: 44px;
    }

    .profile-pic-wrapper img {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #c9a84c;
      display: block;
    }

    .profile-pic-wrapper::after {
      content: '📷';
      position: absolute;
      bottom: -2px;
      right: -2px;
      font-size: 14px;
      background: #c9a84c;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 18px;
      text-align: center;
    }

    .balance-card {
      background: #1a1a1a;
      margin: 20px;
      padding: 20px;
      border-radius: 12px;
    }

    .balance-label { font-size: 12px; color: #aaa; letter-spacing: 1px; }

    .balance-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .balance-amount {
      font-size: 28px;
      font-weight: 700;
      flex: 1;
    }

    .eye-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 4px;
      color: #c9a84c;
      font-size: 22px;
      line-height: 1;
    }

    .balance-footer {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    .bal-action-btn {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      border: none;
      font-size: 15px;
    }

    .gold { background: #c9a84c; color: #000; }
    .outline {
      background: #121212;
      border: 1px solid #c9a84c;
      color: #c9a84c;
    }

    .quick-actions {
      display: flex;
      justify-content: space-between;
      padding: 0 20px;
      margin: 20px 0;
    }

    .quick-btn {
      flex: 1;
      text-align: center;
      padding: 10px;
      border-radius: 12px;
      background: rgba(201,168,76,0.15);
      color: #c9a84c;
      font-size: 12px;
      cursor: pointer;
      margin: 0 5px;
    }

    #adminBtn {
      display: none;
      width: calc(100% - 40px);
      margin: 10px 20px;
      padding: 14px;
      border-radius: 14px;
      background: rgba(201,168,76,0.2);
      color: #c9a84c;
      border: 1px solid rgba(201,168,76,0.35);
      font-weight: 700;
      cursor: pointer;
      text-align: center;
    }

    .section {
      padding: 0 20px 80px;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      justify-content: space-around;
      background: #121212;
      padding: 8px 0;
      border-top: 1px solid #222;
    }

    .nav-item { font-size: 12px; color: #888; cursor: pointer; }
    .nav-item.active { color: #c9a84c; }

    #uploadToast {
      display: none;
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #c9a84c;
      color: #000;
      padding: 8px 20px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
      z-index: 999;
      white-space: nowrap;
    }
  </style>
</head>

<body>

<!-- TOAST -->
<div id="uploadToast"></div>

<!-- HIDDEN FILE INPUT -->
<input type="file" id="uploadPic" accept="image/*" hidden>

<!-- HEADER -->
<div class="top-header">
  <div class="profile-pic-wrapper" onclick="document.getElementById('uploadPic').click()" title="Change profile picture">
    <img id="profilePic" src="icon.png" onerror="this.src='https://via.placeholder.com/44/c9a84c/000?text=F'" />
  </div>
  <div style="flex:1;">
    <div class="greeting-text">Good day,</div>
    <div class="greeting-name" id="greetingName"></div>
  </div>
</div>

<!-- BALANCE -->
<div class="balance-card">
  <div class="balance-label">WALLET BALANCE</div>
  <div class="balance-row">
    <div class="balance-amount" id="balance">$0.00</div>
    <button class="eye-btn" id="eyeBtn" onclick="toggleBalance()">👁️</button>
  </div>
  <div class="balance-footer">
    <button class="bal-action-btn gold" onclick="goFund()">Fund</button>
    <button class="bal-action-btn outline" onclick="goSend()">Send</button>
  </div>
</div>

<!-- QUICK ACTIONS -->
<div class="quick-actions">
  <div class="quick-btn" onclick="goSend()">Send</div>
  <div class="quick-btn" onclick="goFund()">Add Money</div>
  <div class="quick-btn" onclick="goTransactions()">History</div>
  <div class="quick-btn" onclick="window.location='setpin.html'">Set PIN</div>
</div>

<!-- ADMIN -->
<div id="adminBtn" onclick="goAdmin()">⚙️ Admin Panel</div>

<!-- TRANSACTIONS -->
<div class="section">
  <div class="section-header">
    <span>Recent Transactions</span>
    <a href="transaction.html" style="color:#c9a84c;">See all</a>
  </div>
  <div id="recentList"></div>
</div>

<!-- NAV -->
<div class="bottom-nav">
  <div class="nav-item active" onclick="location='dashboard.html'">Home</div>
  <div class="nav-item" onclick="location='transaction.html'">History</div>
  <div class="nav-item" onclick="location='send.html'">Send</div>
  <div class="nav-item" onclick="location='fund.html'">Fund</div>
  <div class="nav-item" onclick="logout()">Logout</div>
</div>

<!-- JS -->
<script src="js/app.js"></script>

<script>
  // ── Balance hide/show ──────────────────────────────
  let realBalance = "$0.00";
let balanceHidden = localStorage.getItem("balanceHidden") === "true";

function toggleBalance() {
  balanceHidden = !balanceHidden;
  localStorage.setItem("balanceHidden", balanceHidden);
  applyBalanceState();
}

function applyBalanceState() {
  document.getElementById("balance").textContent = balanceHidden ? "••••••" : realBalance;
  document.getElementById("eyeBtn").textContent = balanceHidden ? "🙈" : "👁️";
}

  // ── Toast ─────────────────────────────────────────
  function showToast(msg) {
    const toast = document.getElementById("uploadToast");
    toast.textContent = msg;
    toast.style.display = "block";
    setTimeout(() => toast.style.display = "none", 3000);
  }

  // ── Profile picture ───────────────────────────────
  const uploadInput = document.getElementById("uploadPic");
  const profilePic  = document.getElementById("profilePic");

  const savedPic = localStorage.getItem("profilePic");
  if (savedPic) profilePic.src = savedPic;

  uploadInput.addEventListener("change", function () {
    const file = this.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = function (e) {
      profilePic.src = e.target.result;
      localStorage.setItem("profilePic", e.target.result);
      showToast("✅ Profile picture updated!");
    };
    reader.readAsDataURL(file);
    this.value = "";
  });

  // ── User info ─────────────────────────────────────
  function loadUserInfo() {
    const token = localStorage.getItem("token");
    const nameEl = document.getElementById("greetingName");
    if (!token) { nameEl.textContent = "Guest"; return; }
    try {
      const payload = JSON.parse(atob(token.split('.')[1]));
      nameEl.textContent = payload.name || payload.email || "User";
      if (payload.role === "admin") {
        document.getElementById("adminBtn").style.display = "block";
      }
    } catch { nameEl.textContent = "User"; }
  }

  // ── Balance — uses API from app.js, syncs with eye toggle ──
  async function loadBalance() {
  const el = document.getElementById("balance");
  if (!el) return;
  try {
    const res = await fetch(`${API}/api/wallet/balance`, {
      headers: { Authorization: `Bearer ${getToken()}` }
    });
    const data = await res.json();
    if (res.ok) {
      realBalance = "$" + Number(data.balance).toFixed(2);
      applyBalanceState();
    }
  } catch (err) {
    console.log("Balance error:", err);
  }
}

  applyBalanceState(); // ← apply saved eye state immediately on load
loadUserInfo();
loadBalance();
loadTransactions();
</script>

</body>
</html>
