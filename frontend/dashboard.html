<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Festac — Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="css/style.css">

  <style>
    body {
      background-color: #0a0a0a;
      color: #fff;
      font-family: 'Syne', sans-serif;
      margin: 0;
    }

    .top-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 20px;
      background: #121212;
      border-bottom: 1px solid #222;
    }

    .greeting-text { font-size: 14px; color: #aaa; }
    .greeting-name { font-size: 18px; font-weight: 700; }

    .balance-card {
      background: #1a1a1a;
      margin: 20px;
      padding: 20px;
      border-radius: 12px;
    }

    .balance-label { font-size: 12px; color: #aaa; }
    .balance-amount { font-size: 28px; font-weight: 700; }

    .balance-footer {
      display: flex;
      gap: 10px;
      margin-top: 12px;
    }

    .bal-action-btn {
      flex: 1;
      padding: 10px;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
      border: none;
    }

    .gold { background: #c9a84c; color: #000; }
    .outline {
      background: #121212;
      border: 1px solid #c9a84c;
      color: #c9a84c;
    }

    .quick-actions {
      display: flex;
      justify-content: space-between;
      padding: 0 20px;
      margin: 20px 0;
    }

    .quick-btn {
      flex: 1;
      text-align: center;
      padding: 10px;
      border-radius: 12px;
      background: rgba(201,168,76,0.15);
      color: #c9a84c;
      font-size: 12px;
      cursor: pointer;
      margin: 0 5px;
    }

    #adminBtn {
      display: none;
      width: calc(100% - 40px);
      margin: 10px 20px;
      padding: 14px;
      border-radius: 14px;
      background: rgba(201,168,76,0.2);
      color: #c9a84c;
      border: 1px solid rgba(201,168,76,0.35);
      font-weight: 700;
      cursor: pointer;
      text-align: center;
    }

    .upload-box {
      margin: 10px 20px;
      padding: 10px;
      border: 1px solid #c9a84c;
      border-radius: 10px;
      text-align: center;
      color: #c9a84c;
      cursor: pointer;
    }

    .section {
      padding: 0 20px 80px;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      justify-content: space-around;
      background: #121212;
      padding: 8px 0;
      border-top: 1px solid #222;
    }

    .nav-item {
      font-size: 12px;
      color: #888;
      cursor: pointer;
    }

    .nav-item.active {
      color: #c9a84c;
    }
  </style>
</head>

<body>

<!-- HEADER -->
<div class="top-header">

  <img id="profilePic"
       src="https://via.placeholder.com/40"
       style="width:40px;height:40px;border-radius:50%;object-fit:cover;" />

  <div>
    <div class="greeting-text">Good day,</div>
    <div class="greeting-name" id="greetingName"></div>
  </div>

</div>

<!-- PROFILE UPLOAD -->
<label>
  <input type="file" id="uploadPic" hidden>
  <div class="upload-box">Upload Profile Picture</div>
</label>

<!-- BALANCE -->
<div class="balance-card">
  <div class="balance-label">Wallet Balance</div>
  <div class="balance-amount" id="balance">$0.00</div>

  <div class="balance-footer">
    <button class="bal-action-btn gold" onclick="goFund()">Fund</button>
    <button class="bal-action-btn outline" onclick="goSend()">Send</button>
  </div>
</div>

<!-- QUICK ACTIONS -->
<div class="quick-actions">
  <div class="quick-btn" onclick="goSend()">Send</div>
  <div class="quick-btn" onclick="goFund()">Add Money</div>
  <div class="quick-btn" onclick="goTransactions()">History</div>
  <div class="quick-btn" onclick="window.location='setpin.html'">Set PIN</div>
</div>

<!-- ADMIN -->
<div id="adminBtn" onclick="goAdmin()">⚙️ Admin Panel</div>

<!-- TRANSACTIONS -->
<div class="section">
  <div class="section-header">
    <span>Recent Transactions</span>
    <a href="transaction.html" style="color:#c9a84c;">See all</a>
  </div>

  <div id="recentList"></div>
</div>

<!-- NAV -->
<div class="bottom-nav">
  <div class="nav-item active" onclick="location='dashboard.html'">Home</div>
  <div class="nav-item" onclick="location='transaction.html'">History</div>
  <div class="nav-item" onclick="location='send.html'">Send</div>
  <div class="nav-item" onclick="location='fund.html'">Fund</div>
  <div class="nav-item" onclick="logout()">Logout</div>
</div>

<!-- JS -->
<script src="js/app.js"></script>

<script>
function loadUserInfo() {
  const token = localStorage.getItem("token");
  const nameEl = document.getElementById("greetingName");

  if (!token) {
    nameEl.textContent = "Guest";
    return;
  }

  try {
    const payload = JSON.parse(atob(token.split('.')[1]));

    nameEl.textContent = payload.name || payload.email || "User";

    if (payload.role === "admin") {
      document.getElementById("adminBtn").style.display = "block";
    }

  } catch {
    nameEl.textContent = "User";
  }
}

loadUserInfo();
</script>

</body>
</html>
