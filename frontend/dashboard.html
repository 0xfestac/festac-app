<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Festac — Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#c9a84c">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page has-nav">

    <!-- Top Header -->
    <div class="top-header fade-up">
      <div class="header-left">
        <label class="avatar-wrap" title="Change photo">
          <img id="avatarImg" src="icon.png" class="avatar" alt="Profile">
          <div class="avatar-overlay"></div>
          <input type="file" id="avatarInput" accept="image/*" style="display:none" onchange="changeAvatar(event)">
        </label>
        <div>
          <div class="greeting-text">Good day,</div>
          <div class="greeting-name" id="greetingName">Loading...</div>
        </div>
      </div>
      <div class="notif-btn"></div>
    </div>

    <!-- Balance Card -->
    <div class="balance-card fade-up">
      <div class="balance-label">Wallet Balance</div>
      <div class="balance-row">
        <div class="balance-amount">
          <span class="currency">$</span><span id="balance">0.00</span>
        </div>
        <button class="balance-toggle" onclick="toggleBalance()" id="balanceToggle"></button>
      </div>
      <div class="balance-footer">
        <button class="bal-action-btn gold" onclick="goFund()">Fund</button>
        <button class="bal-action-btn outline" onclick="goSend()">Send</button>
      </div>
    </div>

    <!-- Quick Actions -->
    <div class="quick-actions">
      <button class="quick-btn" onclick="goSend()">Send</button>
      <button class="quick-btn" onclick="goFund()">Add Money</button>
      <button class="quick-btn" onclick="goTransactions()">History</button>
      <button class="quick-btn" onclick="window.location='setpin.html'">Set PIN</button>
    </div>

    <!-- Admin Panel Button (only for admins) -->
    <div style="padding:0 20px;">
      <button id="adminBtn" onclick="goAdmin()" style="display:none;
        width:100%;padding:14px;border-radius:12px;margin-bottom:16px;
        background:rgba(201,168,76,0.1);color:#c9a84c;
        border:1px solid rgba(201,168,76,0.3);
        font-family:'Syne',sans-serif;font-size:14px;font-weight:700;cursor:pointer;">
        ⚙️ Admin Panel
      </button>
    </div>

    <!-- Recent Transactions -->
    <div class="section fade-up">
      <div class="section-header">
        <span class="section-title">Recent Transactions</span>
        <a href="transaction.html" class="section-link">See all</a>
      </div>
      <div id="recentList" class="tx-list"></div>
    </div>

  </div>

  <!-- Bottom Nav -->
  <nav class="bottom-nav">
    <a href="dashboard.html" class="nav-item active">Home</a>
    <a href="transaction.html" class="nav-item">History</a>
    <a href="send.html" class="nav-item-center"></a>
    <a href="fund.html" class="nav-item">Fund</a>
    <button class="nav-item" onclick="logout()">Logout</button>
  </nav>

  <div id="toast" class="toast"></div>

  <script src="js/app.js"></script>
  <script>
    // Show admin button if user is admin
    function loadAdminUI() {
      const token = getToken();
      if (!token) return;

      try {
        const payload = JSON.parse(atob(token.split(".")[1]));
        if (payload.role === "admin") {
          document.getElementById("adminBtn").style.display = "block";
        }
      } catch(e) {
        console.error("Invalid token", e);
      }
    }

    function goAdmin() {
      window.location = "admin.html";
    }

    // Call on page load
    loadAdminUI();
  </script>
</body>
</html>
