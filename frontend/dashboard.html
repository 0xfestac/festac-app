<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Festac — Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#00e5a0">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page">
    <nav class="nav">
      <img src="icon.png" class="nav-logo-img" alt="Festac">
      <div class="nav-right">
        <label class="avatar-wrap" title="Change profile picture">
          <img id="avatarImg" src="icon.png" class="avatar" alt="Profile">
          <div class="avatar-overlay">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
          </div>
          <input type="file" id="avatarInput" accept="image/*" style="display:none" onchange="changeAvatar(event)">
        </label>
        <button class="nav-logout" onclick="logout()">Sign out</button>
      </div>
    </nav>

    <div class="dashboard-body">
      <div class="balance-card fade-up">
        <div class="balance-label">Available Balance</div>
        <div class="balance-amount">
          <span class="currency">$</span><span id="balance">0.00</span>
        </div>
        <div class="balance-footer">
          <div class="balance-dot"></div>
          <span class="balance-status">Live balance</span>
        </div>
      </div>

      <p class="section-title fade-up">Quick actions</p>
      <div class="actions-grid fade-up">
        <button class="action-btn" onclick="goSend()">
          <div class="action-icon green">
            <svg viewBox="0 0 24 24" fill="none" stroke="#00e5a0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/>
              <polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
          </div>
          <span class="action-label">Send</span>
        </button>
        <button class="action-btn" onclick="goFund()">
          <div class="action-icon blue">
            <svg viewBox="0 0 24 24" fill="none" stroke="#0095ff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="16"/>
              <line x1="8" y1="12" x2="16" y2="12"/>
            </svg>
          </div>
          <span class="action-label">Add Money</span>
        </button>
        <button class="action-btn" onclick="goTransactions()">
          <div class="action-icon purple">
            <svg viewBox="0 0 24 24" fill="none" stroke="#8b5cf6" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="8" y1="6" x2="21" y2="6"/>
              <line x1="8" y1="12" x2="21" y2="12"/>
              <line x1="8" y1="18" x2="21" y2="18"/>
              <line x1="3" y1="6" x2="3.01" y2="6"/>
              <line x1="3" y1="12" x2="3.01" y2="12"/>
              <line x1="3" y1="18" x2="3.01" y2="18"/>
            </svg>
          </div>
          <span class="action-label">History</span>
        </button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <script src="js/app.js"></script>
</body>
</html>
