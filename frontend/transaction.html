<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Festac — Transactions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

  <style>
    body {
      background: #0a0a0a;
      color: #fff;
      font-family: 'Syne', sans-serif;
      margin: 0;
    }

    .page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: #121212;
      border-bottom: 1px solid #222;
    }

    .page-header a { color: #c9a84c; font-size: 20px; text-decoration: none; }
    .page-header h2 { margin: 0; font-size: 16px; }
    .page-logo { width: 32px; height: 32px; border-radius: 50%; }

    .brand-header {
      text-align: center;
      padding: 10px 0 4px;
    }

    .brand-name {
      font-weight: 800;
      font-size: 13px;
      background: linear-gradient(135deg,#c9a84c,#f5e6b3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 2px;
    }

    .page-body { padding: 16px 16px 80px; }

    .tx-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 14px;
      position: relative;
      overflow: hidden;
    }

    .tx-card::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 4px;
      border-radius: 4px 0 0 4px;
    }

    .tx-card.credit::before { background: #22c55e; }
    .tx-card.debit::before { background: #ef4444; }

    .tx-type-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .credit .tx-type-badge { background: rgba(34,197,94,0.15); color: #22c55e; }
    .debit .tx-type-badge { background: rgba(239,68,68,0.15); color: #ef4444; }

    .tx-amount {
      font-size: 24px;
      font-weight: 800;
      margin-bottom: 12px;
    }

    .credit .tx-amount { color: #22c55e; }
    .debit .tx-amount { color: #ef4444; }

    .tx-row {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      margin-bottom: 6px;
      color: #aaa;
    }

    .tx-row span:last-child {
      color: #fff;
      font-weight: 600;
      text-align: right;
      max-width: 60%;
      word-break: break-all;
    }

    .tx-divider {
      border: none;
      border-top: 1px solid #2a2a2a;
      margin: 12px 0;
    }

    .receipt-btn {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid rgba(201,168,76,0.4);
      background: rgba(201,168,76,0.1);
      color: #c9a84c;
      font-weight: 700;
      cursor: pointer;
      font-size: 13px;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: none;
      align-items: flex-end;
      justify-content: center;
      z-index: 1000;
    }

    .modal.show { display: flex; }

    .receipt-box {
      background: #fff;
      color: #000;
      width: 100%;
      max-width: 480px;
      border-radius: 20px 20px 0 0;
      padding: 24px 20px 32px;
      max-height: 90vh;
      overflow-y: auto;
    }

    .receipt-header {
      text-align: center;
      border-bottom: 2px dashed #ddd;
      padding-bottom: 16px;
      margin-bottom: 16px;
    }

    .receipt-logo {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      margin-bottom: 8px;
    }

    .receipt-bank-name {
      font-size: 18px;
      font-weight: 800;
      color: #c9a84c;
      letter-spacing: 2px;
    }

    .receipt-tag { font-size: 11px; color: #888; margin-top: 2px; }

    .receipt-status {
      display: inline-block;
      background: #dcfce7;
      color: #16a34a;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      margin: 10px 0;
    }

    .receipt-amount {
      font-size: 32px;
      font-weight: 800;
      color: #000;
      margin: 8px 0;
    }

    .receipt-body { margin-bottom: 16px; }

    .receipt-row {
      display: flex;
      justify-content: space-between;
      padding: 10px 0;
      border-bottom: 1px solid #f0f0f0;
      font-size: 13px;
    }

    .receipt-row .label { color: #888; }
    .receipt-row .value {
      font-weight: 700;
      color: #000;
      text-align: right;
      max-width: 60%;
      word-break: break-all;
    }

    .receipt-footer {
      text-align: center;
      border-top: 2px dashed #ddd;
      padding-top: 14px;
      font-size: 11px;
      color: #aaa;
    }

    .receipt-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    .receipt-actions button {
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-weight: 700;
      cursor: pointer;
      font-size: 13px;
    }

    .btn-download { background: #c9a84c; color: #000; grid-column: 1 / -1; }
    .btn-whatsapp { background: #25D366; color: #fff; }
    .btn-telegram { background: #0088cc; color: #fff; }
    .btn-close { background: #f0f0f0; color: #000; grid-column: 1 / -1; }

    .empty-state {
      text-align: center;
      color: #555;
      padding: 40px 20px;
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      width: 100%;
      display: flex;
      justify-content: space-around;
      background: #121212;
      padding: 8px 0;
      border-top: 1px solid #222;
    }

    .nav-item { font-size: 12px; color: #888; cursor: pointer; }
    .nav-item.active { color: #c9a84c; }
  </style>
</head>

<body>

<div class="page-header">
  <a href="dashboard.html">←</a>
  <h2>Transactions</h2>
  <img src="icon.png" class="page-logo" onerror="this.style.display='none'">
</div>

<div class="brand-header">
  <div class="brand-name">FESTAC WALLET</div>
</div>

<div class="page-body">
  <div id="list"></div>
</div>

<!-- RECEIPT MODAL -->
<div id="receiptModal" class="modal">
  <div class="receipt-box" id="receiptBox">

    <div class="receipt-header">
      <img src="icon.png" class="receipt-logo" onerror="this.style.display='none'">
      <div class="receipt-bank-name">FESTAC WALLET</div>
      <div class="receipt-tag">Transaction Receipt</div>
      <div class="receipt-status">✓ SUCCESSFUL</div>
      <div class="receipt-amount" id="r-amount"></div>
    </div>

    <div class="receipt-body" id="receiptContent"></div>

    <div class="receipt-footer">
      Festac Wallet · Your money, simplified<br>
      <span id="r-footer-date"></span>
    </div>

    <div class="receipt-actions">
      <button class="btn-download" onclick="downloadReceipt()">⬇️ Download PDF</button>
      <button class="btn-whatsapp" onclick="shareWhatsApp()">WhatsApp</button>
      <button class="btn-telegram" onclick="shareTelegram()">Telegram</button>
      <button class="btn-close" onclick="closeReceipt()">Close</button>
    </div>

  </div>
</div>

<div class="bottom-nav">
  <div class="nav-item" onclick="location='dashboard.html'">Home</div>
  <div class="nav-item active">History</div>
  <div class="nav-item" onclick="location='send.html'">Send</div>
  <div class="nav-item" onclick="location='fund.html'">Fund</div>
</div>

<script src="js/app.js"></script>

<script>
let currentTx = null;

async function loadTransactions() {
  try {
    const res = await fetch(`${API}/api/wallet/transactions`, {
      headers: { Authorization: `Bearer ${getToken()}` }
    });

    const data = await res.json();
    const list = document.getElementById("list");

    if (!data.length) {
      list.innerHTML = `<div class="empty-state">💸 No transactions yet</div>`;
      return;
    }

    const token = getToken();
    let myEmail = "";
    try {
      myEmail = JSON.parse(atob(token.split('.')[1])).email || "";
    } catch {}

    list.innerHTML = data.map(tx => {
      const isCredit = tx.type === "credit";
      const sign = isCredit ? "+" : "-";
      const typeClass = isCredit ? "credit" : "debit";
      const typeLabel = isCredit ? "RECEIVED" : "SENT";
      const counterparty = isCredit ? (tx.from || "Unknown") : (tx.to || "Unknown");
      const label = isCredit ? "From" : "To";
      const dateStr = tx.date
        ? new Date(tx.date).toLocaleString("en-GB", {
            day: "2-digit", month: "short", year: "numeric",
            hour: "2-digit", minute: "2-digit"
          })
        : "No date";

      return `
        <div class="tx-card ${typeClass}">
          <span class="tx-type-badge">${typeLabel}</span>
          <div class="tx-amount">${sign}$${Number(tx.amount).toFixed(2)}</div>
          <div class="tx-row"><span>${label}</span><span>${counterparty}</span></div>
          <div class="tx-row"><span>Date</span><span>${dateStr}</span></div>
          <hr class="tx-divider">
          <button class="receipt-btn" onclick='openReceipt(${JSON.stringify(tx)}, "${myEmail}")'>
            🧾 View Receipt
          </button>
        </div>
      `;
    }).join("");

  } catch (err) {
    console.log("Transaction error:", err);
    document.getElementById("list").innerHTML = `<div class="empty-state">Failed to load transactions</div>`;
  }
}

function openReceipt(tx, myEmail) {
  currentTx = tx;
  const isCredit = tx.type === "credit";
  const dateStr = tx.date
    ? new Date(tx.date).toLocaleString("en-GB", {
        day: "2-digit", month: "short", year: "numeric",
        hour: "2-digit", minute: "2-digit"
      })
    : "No date";

  const sender = isCredit ? (tx.from || "Unknown") : (myEmail || "You");
  const receiver = isCredit ? (myEmail || "You") : (tx.to || "Unknown");

  document.getElementById("r-amount").textContent =
    `${isCredit ? "+" : "-"}$${Number(tx.amount).toFixed(2)}`;
  document.getElementById("r-footer-date").textContent = dateStr;

  document.getElementById("receiptContent").innerHTML = `
    <div class="receipt-row"><span class="label">Transaction ID</span><span class="value">${tx._id || "N/A"}</span></div>
    <div class="receipt-row"><span class="label">Type</span><span class="value">${isCredit ? "Credit" : "Debit"}</span></div>
    <div class="receipt-row"><span class="label">Sender</span><span class="value">${sender}</span></div>
    <div class="receipt-row"><span class="label">Receiver</span><span class="value">${receiver}</span></div>
    <div class="receipt-row"><span class="label">Amount</span><span class="value">$${Number(tx.amount).toFixed(2)}</span></div>
    <div class="receipt-row"><span class="label">Status</span><span class="value">✓ Successful</span></div>
    <div class="receipt-row"><span class="label">Date & Time</span><span class="value">${dateStr}</span></div>
  `;

  document.getElementById("receiptModal").classList.add("show");
}

function closeReceipt() {
  document.getElementById("receiptModal").classList.remove("show");
}

function getFileName() {
  const txDate = currentTx.date ? new Date(currentTx.date) : new Date();
  const dd = String(txDate.getDate()).padStart(2, "0");
  const mm = String(txDate.getMonth() + 1).padStart(2, "0");
  const yy = String(txDate.getFullYear()).slice(-2);
  const hh = String(txDate.getHours()).padStart(2, "0");
  const min = String(txDate.getMinutes()).padStart(2, "0");
  const shortId = (currentTx._id || "XXXXXXXX").slice(-8).toUpperCase();
  return `festac${shortId}${dd}${mm}${yy}${hh}${min}.pdf`;
}

function generatePDF() {
  if (!currentTx) return null;

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ unit: "mm", format: "a4" });
  const isCredit = currentTx.type === "credit";
  const amount = "$" + Number(currentTx.amount).toFixed(2);

  const token = getToken();
  let myEmail = "";
  try { myEmail = JSON.parse(atob(token.split('.')[1])).email || ""; } catch {}

  const sender = isCredit ? (currentTx.from || "Unknown") : myEmail || "You";
  const receiver = isCredit ? myEmail || "You" : (currentTx.to || "Unknown");

  const txDate = currentTx.date ? new Date(currentTx.date) : new Date();
  const dateStr = txDate.toLocaleString("en-GB", {
    day: "2-digit", month: "short", year: "numeric",
    hour: "2-digit", minute: "2-digit"
  });

  const shortId = (currentTx._id || "XXXXXXXX").slice(-8).toUpperCase();
  const fileName = getFileName();
  const pageW = doc.internal.pageSize.getWidth();
  const cx = pageW / 2;

  // Background
  doc.setFillColor(10, 10, 10);
  doc.rect(0, 0, pageW, 297, "F");

  // Gold header
  doc.setFillColor(201, 168, 76);
  doc.rect(0, 0, pageW, 40, "F");

  // Bank name
  doc.setFont("helvetica", "bold");
  doc.setFontSize(22);
  doc.setTextColor(0, 0, 0);
  doc.text("FESTAC WALLET", cx, 18, { align: "center" });

  doc.setFontSize(10);
  doc.setFont("helvetica", "normal");
  doc.text("Transaction Receipt", cx, 26, { align: "center" });

  // Status badge
  doc.setFillColor(34, 197, 94);
  doc.roundedRect(cx - 20, 30, 40, 8, 3, 3, "F");
  doc.setFontSize(9);
  doc.setTextColor(255, 255, 255);
  doc.text("SUCCESSFUL", cx, 35.5, { align: "center" });

  // Amount
  doc.setFontSize(32);
  doc.setFont("helvetica", "bold");
  doc.setTextColor(201, 168, 76);
  doc.text(`${isCredit ? "+" : "-"}${amount}`, cx, 60, { align: "center" });

  // Divider
  doc.setDrawColor(50, 50, 50);
  doc.setLineWidth(0.3);
  doc.line(20, 66, pageW - 20, 66);

  // Rows
  const rows = [
    ["Transaction ID", shortId],
    ["Type", isCredit ? "Credit" : "Debit"],
    ["Sender", sender],
    ["Receiver", receiver],
    ["Amount", amount],
    ["Status", "Successful"],
    ["Date & Time", dateStr],
  ];

  let y = 76;
  rows.forEach(([label, value]) => {
    doc.setFontSize(10);
    doc.setFont("helvetica", "normal");
    doc.setTextColor(150, 150, 150);
    doc.text(label, 22, y);

    doc.setFont("helvetica", "bold");
    doc.setTextColor(255, 255, 255);
    doc.text(String(value), pageW - 22, y, { align: "right" });

    doc.setDrawColor(30, 30, 30);
    doc.line(22, y + 4, pageW - 22, y + 4);
    y += 14;
  });

  // Footer
  doc.setDrawColor(50, 50, 50);
  doc.line(20, y + 4, pageW - 20, y + 4);
  doc.setFontSize(9);
  doc.setFont("helvetica", "normal");
  doc.setTextColor(100, 100, 100);
  doc.text("Festac Wallet · Your money, simplified", cx, y + 12, { align: "center" });
  doc.text(dateStr, cx, y + 18, { align: "center" });

  return { doc, fileName };
}

function downloadReceipt() {
  const result = generatePDF();
  if (!result) return;
  result.doc.save(result.fileName);
}

async function shareWhatsApp() {
  const result = generatePDF();
  if (!result) return;

  const pdfBlob = result.doc.output("blob");
  const file = new File([pdfBlob], result.fileName, { type: "application/pdf" });

  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({ files: [file], title: "Festac Receipt", text: "My Festac Wallet transaction receipt" });
      return;
    } catch {}
  }

  // Fallback
  result.doc.save(result.fileName);
  setTimeout(() => window.open("https://wa.me/", "_blank"), 1500);
}

async function shareTelegram() {
  const result = generatePDF();
  if (!result) return;

  const pdfBlob = result.doc.output("blob");
  const file = new File([pdfBlob], result.fileName, { type: "application/pdf" });

  if (navigator.canShare && navigator.canShare({ files: [file] })) {
    try {
      await navigator.share({ files: [file], title: "Festac Receipt", text: "My Festac Wallet transaction receipt" });
      return;
    } catch {}
  }

  // Fallback
  result.doc.save(result.fileName);
  setTimeout(() => window.open("https://t.me/", "_blank"), 1500);
}

loadTransactions();
</script>

</body>
</html>
