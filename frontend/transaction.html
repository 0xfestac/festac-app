<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Festac — Transactions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#c9a84c">
  <link rel="stylesheet" href="css/style.css">

  <style>
    /* ===== Premium Header ===== */
    .brand-header {
      display: flex;
      align-items: center;
      gap: 10px;
      justify-content: center;
      margin-bottom: 10px;
    }
    .brand-logo {
      width: 28px;
      height: 28px;
    }
    .brand-name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 16px;
      background: linear-gradient(135deg,#c9a84c,#f5e6b3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* ===== Transaction Card Upgrade ===== */
    .tx-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
      position: relative;
      overflow: hidden;
    }

    .tx-card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(201,168,76,0.4), transparent);
    }

    .tx-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }

    .tx-label {
      font-size: 11px;
      color: var(--text-muted);
    }

    .tx-value {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
    }

    .tx-amount {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 800;
      color: var(--gold);
      margin-top: 6px;
    }

    .receipt-btn {
      margin-top: 10px;
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid rgba(201,168,76,0.3);
      background: var(--gold-dim);
      color: var(--gold);
      font-family: 'Syne', sans-serif;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
    }

    /* ===== Premium Receipt Modal ===== */
    .receipt-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 1000;
    }

    .receipt-box {
      background: #0f0f0f;
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 18px;
      padding: 20px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    }

    .receipt-header {
      text-align: center;
      margin-bottom: 16px;
    }

    .receipt-title {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 800;
      color: var(--gold);
    }

    .receipt-item {
      display: flex;
      justify-content: space-between;
      margin: 8px 0;
      font-size: 13px;
    }

    .download-btn {
      margin-top: 14px;
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(135deg,#c9a84c,#f5e6b3);
      color: #000;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="page has-nav">

  <div class="page-header fade-up">
    <a href="dashboard.html" class="back-btn">←</a>
    <h2>Transactions</h2>
    <img src="icon.png" class="page-logo">
  </div>

  <!-- FESTAC BRAND -->
  <div class="brand-header fade-up">
    <img src="icon.png" class="brand-logo">
    <div class="brand-name">FESTAC WALLET</div>
  </div>

  <div class="page-body">
    <div id="list"></div>
  </div>
</div>

<!-- RECEIPT MODAL -->
<div id="receiptModal" class="receipt-modal">
  <div class="receipt-box" id="receiptBox">
    <div class="receipt-header">
      <div class="receipt-title">FESTAC RECEIPT</div>
    </div>

    <div id="receiptContent"></div>

    <button class="download-btn" onclick="downloadPDF()">Download PDF</button>
    <button class="download-btn" style="margin-top:8px;background:#222;color:#fff" onclick="closeReceipt()">Close</button>
  </div>
</div>

<nav class="bottom-nav">
  <a href="dashboard.html" class="nav-item">Home</a>
  <a href="transaction.html" class="nav-item active">History</a>
  <a href="send.html" class="nav-item-center">Send</a>
  <a href="fund.html" class="nav-item">Fund</a>
  <button class="nav-item" onclick="logout()">Logout</button>
</nav>

<script src="js/app.js"></script>

<script>
let currentTx = null;

async function loadTransactions() {
  try {
    const res = await fetch(`${API}/api/wallet/transactions`, {
      headers: { Authorization: `Bearer ${getToken()}` }
    });

    const data = await res.json();
    const list = document.getElementById("list");

    if (!data.length) {
      list.innerHTML = "<p>No transactions yet</p>";
      return;
    }

    list.innerHTML = data.map(tx => `
      <div class="tx-card">
        <div class="tx-row">
          <span class="tx-label">From</span>
          <span class="tx-value">${tx.from}</span>
        </div>
        <div class="tx-row">
          <span class="tx-label">To</span>
          <span class="tx-value">${tx.to}</span>
        </div>
        <div class="tx-row">
          <span class="tx-label">Status</span>
          <span class="tx-value">${tx.status}</span>
        </div>

        <div class="tx-amount">$${tx.amount}</div>

        <button class="receipt-btn" onclick='openReceipt(${JSON.stringify(tx)})'>
          Download Receipt
        </button>
      </div>
    `).join("");

  } catch {
    showToast("Failed to load transactions","error");
  }
}

function openReceipt(tx) {
  currentTx = tx;

  document.getElementById("receiptContent").innerHTML = `
    <div class="receipt-item"><span>ID</span><span>${tx._id}</span></div>
    <div class="receipt-item"><span>From</span><span>${tx.from}</span></div>
    <div class="receipt-item"><span>To</span><span>${tx.to}</span></div>
    <div class="receipt-item"><span>Amount</span><span>$${tx.amount}</span></div>
    <div class="receipt-item"><span>Status</span><span>${tx.status}</span></div>
    <div class="receipt-item"><span>Date</span><span>${new Date(tx.createdAt).toLocaleString()}</span></div>
  `;

  document.getElementById("receiptModal").style.display = "flex";
}

function closeReceipt() {
  document.getElementById("receiptModal").style.display = "none";
}

function downloadPDF() {
  const content = document.getElementById("receiptBox").innerHTML;
  const win = window.open("", "", "width=600,height=800");
  win.document.write(`
    <html>
    <head>
      <title>Festac Receipt</title>
      <style>
        body { font-family: Arial; padding:20px; }
      </style>
    </head>
    <body>${content}</body>
    </html>
  `);
  win.document.close();
  win.print();
}

loadTransactions();
</script>

</body>
</html>
