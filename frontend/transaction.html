<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Festac — Transactions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#c9a84c">
  <link rel="stylesheet" href="css/style.css">

  <style>
    body {
      background:#0a0a0a;
      color:#fff;
      font-family:'Syne',sans-serif;
      margin:0;
    }

    .top-header {
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding:16px 20px;
      background:#121212;
      border-bottom:1px solid #222;
    }

    .back-btn {
      color:#c9a84c;
      font-size:18px;
      cursor:pointer;
    }

    .title {
      font-weight:700;
      font-size:16px;
    }

    .tx-container {
      padding:20px;
    }

    .tx-card {
      background:#1a1a1a;
      padding:14px;
      border-radius:12px;
      margin-bottom:12px;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .tx-info {
      display:flex;
      flex-direction:column;
    }

    .tx-name {
      font-size:14px;
      font-weight:600;
    }

    .tx-date {
      font-size:12px;
      color:#aaa;
    }

    .tx-amount {
      font-weight:700;
    }

    .credit {
      color:#4caf50;
    }

    .debit {
      color:#ff4d4d;
    }

    /* Bottom nav */
    .bottom-nav {
      position:fixed;
      bottom:0;
      width:100%;
      display:flex;
      justify-content:space-around;
      background:#121212;
      padding:8px 0;
      border-top:1px solid #222;
    }

    .nav-item {
      font-size:12px;
      color:#888;
      text-align:center;
      cursor:pointer;
    }

    .nav-item.active {
      color:#c9a84c;
    }
  </style>
</head>

<body>

<!-- Header -->
<div class="top-header">
  <div class="back-btn" onclick="window.location='dashboard.html'">←</div>
  <div class="title">Transaction History</div>
  <div></div>
</div>

<!-- Transactions -->
<div class="tx-container" id="list">

  <!-- Example item (will be replaced by JS) -->
  <div class="tx-card">
    <div class="tx-info">
      <span class="tx-name">Loading...</span>
      <span class="tx-date">Please wait</span>
    </div>
    <div class="tx-amount">$0.00</div>
  </div>

</div>

<!-- Bottom Nav -->
<nav class="bottom-nav">
  <div class="nav-item" onclick="window.location='dashboard.html'">🏠 Home</div>
  <div class="nav-item active">📜 History</div>
  <div class="nav-item" onclick="window.location='send.html'">✉️ Send</div>
  <div class="nav-item" onclick="window.location='fund.html'">💰 Fund</div>
  <div class="nav-item" onclick="logout()">🚪 Logout</div>
</nav>

<div id="toast" class="toast"></div>

<script src="js/app.js"></script>

<script>
// OPTIONAL: Sample renderer (replace with your API later)
async function loadTransactions() {
  const list = document.getElementById("list");

  try {
    const res = await fetch(`${API}/api/transactions`, {
      headers: { Authorization: `Bearer ${getToken()}` }
    });

    const data = await res.json();

    list.innerHTML = "";

    data.forEach(tx => {
      const typeClass = tx.type === "credit" ? "credit" : "debit";
      const sign = tx.type === "credit" ? "+" : "-";

      list.innerHTML += `
        <div class="tx-card">
          <div class="tx-info">
            <span class="tx-name">${tx.description || "Transaction"}</span>
            <span class="tx-date">${new Date(tx.createdAt).toLocaleString()}</span>
          </div>
          <div class="tx-amount ${typeClass}">
            ${sign}$${parseFloat(tx.amount).toFixed(2)}
          </div>
        </div>
      `;
    });

  } catch {
    list.innerHTML = "<p style='color:#aaa'>Failed to load transactions</p>";
  }
}

loadTransactions();
</script>

</body>
</html>
