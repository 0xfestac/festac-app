<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Festac — Transactions</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="css/style.css">

  <style>
    .brand-header {
      text-align: center;
      margin-bottom: 12px;
    }

    .brand-name {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      font-size: 16px;
      background: linear-gradient(135deg,#c9a84c,#f5e6b3);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .tx-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
    }

    .tx-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 6px;
    }

    .tx-amount {
      font-size: 18px;
      font-weight: 800;
      color: var(--gold);
      margin-top: 6px;
    }

    .receipt-btn {
      margin-top: 10px;
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: none;
      background: var(--gold-dim);
      color: var(--gold);
      font-weight: 700;
      cursor: pointer;
    }

    .modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: none;
      align-items: center;
      justify-content: center;
    }

    .receipt-box {
      background: #0f0f0f;
      padding: 20px;
      border-radius: 16px;
      width: 90%;
      max-width: 360px;
      border: 1px solid rgba(201,168,76,0.3);
    }

    .receipt-title {
      text-align: center;
      font-weight: 800;
      color: var(--gold);
      margin-bottom: 12px;
    }

    .receipt-item {
      display: flex;
      justify-content: space-between;
      margin: 6px 0;
      font-size: 13px;
    }

    .download-btn {
      margin-top: 12px;
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg,#c9a84c,#f5e6b3);
      border: none;
      border-radius: 10px;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="page has-nav">

  <div class="page-header">
    <a href="dashboard.html">←</a>
    <h2>Transactions</h2>
    <img src="icon.png" class="page-logo">
  </div>

  <div class="brand-header">
    <div class="brand-name">FESTAC WALLET</div>
  </div>

  <div class="page-body">
    <div id="list"></div>
  </div>
</div>

<!-- RECEIPT MODAL -->
<div id="receiptModal" class="modal">
  <div class="receipt-box" id="receiptBox">
    <div class="receipt-title">FESTAC RECEIPT</div>
    <div id="receiptContent"></div>

    <button class="download-btn" onclick="downloadPDF()">Download PDF</button>
    <button class="download-btn" style="background:#222;color:#fff" onclick="closeReceipt()">Close</button>
  </div>
</div>

<script src="js/app.js"></script>

<script>
let currentTx = null;

async function loadTransactions() {
  try {
    const res = await fetch(`${API}/api/wallet/transactions`, {
      headers: { Authorization: `Bearer ${getToken()}` }
    });

    const data = await res.json();
    const list = document.getElementById("list");

    if (!data.length) {
      list.innerHTML = "<p>No transactions yet</p>";
      return;
    }

    list.innerHTML = data.map(tx => `
      <div class="tx-card">
        <div class="tx-row"><span>From</span><span>${tx.from}</span></div>
        <div class="tx-row"><span>To</span><span>${tx.to}</span></div>
        <div class="tx-row"><span>Status</span><span>${tx.status}</span></div>
        <div class="tx-amount">$${tx.amount}</div>
        <button class="receipt-btn" onclick='openReceipt(${JSON.stringify(tx)})'>
          Download Receipt
        </button>
      </div>
    `).join("");

  } catch {
    showToast("Failed to load","error");
  }
}

function openReceipt(tx) {
  currentTx = tx;

  document.getElementById("receiptContent").innerHTML = `
    <div class="receipt-item"><span>ID</span><span>${tx._id}</span></div>
    <div class="receipt-item"><span>From</span><span>${tx.from}</span></div>
    <div class="receipt-item"><span>To</span><span>${tx.to}</span></div>
    <div class="receipt-item"><span>Amount</span><span>$${tx.amount}</span></div>
    <div class="receipt-item"><span>Status</span><span>${tx.status}</span></div>
    <div class="receipt-item"><span>Date</span><span>${new Date(tx.createdAt).toLocaleString()}</span></div>
  `;

  document.getElementById("receiptModal").style.display = "flex";
}

function closeReceipt() {
  document.getElementById("receiptModal").style.display = "none";
}

function downloadPDF() {
  const content = document.getElementById("receiptBox").innerHTML;

  const win = window.open("", "_blank");

  win.document.write(`
    <style>
      body {
        font-family: Arial;
        padding: 20px;
      }
      .receipt-title {
        font-size: 20px;
        font-weight: bold;
        text-align: center;
        margin-bottom: 16px;
      }
      .receipt-item {
        display: flex;
        justify-content: space-between;
        margin: 8px 0;
      }
    </style>

    <div class="receipt-title">FESTAC RECEIPT</div>
    ${content}
  `);

  win.document.close();
  win.print();
}

loadTransactions();
</script>

</body>
</html>
